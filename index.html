<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Dua Dates | Best and Quality Dates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8e6d45; /* Gold/Bronze */
            --dark: #2c2c2c;
            --light: #f9f9f9;
            --white: #ffffff;
            --success: #27ae60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }

        /* Header */
        header { background: var(--dark); color: var(--white); padding: 2rem 1rem; text-align: center; border-bottom: 4px solid var(--primary); }
        header h1 { font-size: 2rem; color: var(--primary); }
        header p { font-size: 0.9rem; opacity: 0.8; }

        /* Category Filter */
        .categories { display: flex; justify-content: center; gap: 10px; padding: 1rem; overflow-x: auto; white-space: nowrap; sticky; top: 0; background: var(--light); z-index: 10; }
        .cat-btn { background: var(--white); border: 1px solid var(--primary); color: var(--primary); padding: 5px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: var(--white); }

        /* Product Grid */
        .container { max-width: 1100px; margin: auto; padding: 1rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .product-card { background: var(--white); border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .product-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .product-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 5px; }
        .product-desc { font-size: 0.75rem; color: #666; margin-bottom: 8px; flex-grow: 1; }
        .product-price { color: var(--primary); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        .add-btn { background: var(--dark); color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; width: 100%; transition: 0.2s; }
        .add-btn:active { transform: scale(0.95); background: var(--primary); }

        /* Cart UI */
        #cart-icon { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 99; }
        #cart-count { position: absolute; top: 0; right: 0; background: red; color: white; font-size: 12px; padding: 2px 6px; border-radius: 50%; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 500px; max-height: 90vh; border-radius: 15px; overflow-y: auto; padding: 20px; }
        .close-modal { float: right; font-size: 24px; cursor: pointer; }

        .cart-item { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .qty-controls { display: flex; align-items: center; gap: 8px; }
        .qty-btn { background: #eee; border: none; width: 25px; height: 25px; border-radius: 4px; cursor: pointer; }

        /* Checkout Form */
        form { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        input, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; }
        .order-btn { background: var(--success); color: white; border: none; padding: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* WhatsApp Button */
        .wa-float { position: fixed; bottom: 90px; right: 25px; background: #25d366; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 98; }

        @media (min-width: 768px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Al-Dua Dates</h1>
        <p>Best and Quality Dates | Shaheen Bagh, Delhi</p>
    </header>

    <div class="categories" id="category-bar">
        <button class="cat-btn active" onclick="filterProducts('All')">All</button>
        <button class="cat-btn" onclick="filterProducts('Premium')">Premium</button>
        <button class="cat-btn" onclick="filterProducts('Daily')">Daily Use</button>
        <button class="cat-btn" onclick="filterProducts('Gift')">Gift Packs</button>
    </div>

    <div class="container">
        <div class="products-grid" id="product-list">
            </div>
    </div>

    <div id="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>

    <a href="https://wa.me/917480056715" class="wa-float" target="_blank">
        <svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.246 2.248 3.484 5.232 3.483 8.412-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.308 1.656zm6.29-4.171c1.589.943 3.508 1.441 5.463 1.441h.005c5.339 0 9.69-4.35 9.693-9.688 0-2.587-1.007-5.019-2.837-6.848-1.829-1.83-4.259-2.837-6.847-2.837-5.339 0-9.691 4.351-9.693 9.691-.001 2.105.549 4.158 1.594 5.953l-1.038 3.79 3.887-1.02zm11.234-6.42c-.301-.15-1.782-.879-2.057-.979-.275-.1-.475-.15-.675.15-.199.299-.775.979-.95 1.174-.175.195-.351.219-.652.069-.302-.15-1.272-.469-2.422-1.496-.894-.797-1.497-1.782-1.672-2.081-.175-.3-.018-.463.132-.612.135-.133.301-.35.452-.524.151-.174.201-.299.302-.498.101-.199.05-.374-.025-.524-.075-.15-.675-1.625-.925-2.224-.244-.589-.493-.51-.675-.519-.174-.009-.375-.01-.575-.01-.2 0-.525.075-.8.374-.275.299-1.05 1.024-1.05 2.5s1.075 2.912 1.225 3.112c.15.2 2.113 3.227 5.119 4.527.714.31 1.271.496 1.706.635.717.227 1.369.195 1.885.119.575-.085 1.782-.728 2.032-1.429.25-.7.25-1.3.175-1.429-.075-.13-.275-.205-.576-.355z"/></svg>
    </a>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleCart()">&times;</span>
            <h2 style="margin-bottom: 20px;">Your Cart</h2>
            <div id="cart-items-container">
                </div>
            <div style="margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px;">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
                    <span>Total:</span>
                    <span id="grand-total">₹0</span>
                </div>
            </div>

            <form id="order-form" action="https://formspree.io/f/mpqyywol" method="POST">
                <input type="hidden" name="Order_Details" id="hidden-order-summary">
                
                <h3 style="margin-top: 10px;">Delivery Details</h3>
                <input type="text" name="Name" placeholder="Your Name" required>
                <input type="tel" name="Phone" placeholder="WhatsApp Number" required>
                <textarea name="Address" rows="3" placeholder="Complete Delivery Address" required></textarea>
                <textarea name="Instructions" rows="2" placeholder="Special Instructions (Optional)"></textarea>
                
                <button type="submit" class="order-btn">Confirm & Place Order</button>
            </form>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Ajwa Dates (Premium)", price: 800, cat: "Premium", img: "https://i.ibb.co/Pz9ShnGK/ajwa.jpg", desc: "Prophetic medicine, dark and soft." },
            { id: 2, name: "Medjool Large", price: 1200, cat: "Premium", img: "https://i.ibb.co/nNgPnVnb/medjool.jpg", desc: "The king of dates, large and sweet." },
            { id: 3, name: "Kimia Dates", price: 350, cat: "Daily", img: "https://i.ibb.co/4BQNtxL/kimia.jpg", desc: "Fresh melt-in-mouth Iranian dates." },
            { id: 4, name: "Kalmi Dates", price: 600, cat: "Daily", img: "https://i.ibb.co/fzZ9XD8b/kalmi.jpg", desc: "Rich in minerals, safari quality." },
            { id: 5, name: "Mabroom Dates", price: 900, cat: "Premium", img: "https://i.ibb.co/vCx0SvzC/mabroom.jpg", desc: "Long, slender, and chewy texture." },
            { id: 6, name: "Sukkari Dates", price: 500, cat: "Daily", img: "https://i.ibb.co/2YKphtTs/sukkari.jpg", desc: "Golden, crispy, and naturally sweet." },
            { id: 7, name: "Date Syrup (500g)", price: 250, cat: "Daily", img: "https://i.ibb.co/4wMsdJ0T/syrup.jpg", desc: "Natural sweetener for health." },
            { id: 8, name: "Stuffed Dates Box", price: 1500, cat: "Gift", img: "https://i.ibb.co/tMGMzH2X/stuffed.jpg", desc: "Dates stuffed with premium nuts." },
            { id: 9, name: "Zahidi Dates", price: 200, cat: "Daily", img: "https://i.ibb.co/5WDbn5T4/zahidi.jpg", desc: "Golden-colored firm dates." },
            { id: 10, name: "Safi Dates", price: 450, cat: "Daily", img: "https://i.ibb.co/wrQtCZks/safi.jpg", desc: "Balanced sweetness, very healthy." }
        ];

        let cart = JSON.parse(localStorage.getItem('aldua_cart')) || [];

        function renderProducts(filter = 'All') {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            products.forEach(p => {
                if (filter === 'All' || p.cat === filter) {
                    list.innerHTML += `
                        <div class="product-card">
                            <img src="${p.img}" alt="${p.name}" class="product-img" loading="lazy">
                            <div class="product-info">
                                <div class="product-name">${p.name}</div>
                                <div class="product-desc">${p.desc}</div>
                                <div class="product-price">₹${p.price}</div>
                                <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function filterProducts(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(cat);
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            const inCart = cart.find(i => i.id === id);
            if (inCart) {
                inCart.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            updateCart();
        }

        function updateCart() {
            localStorage.setItem('aldua_cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.reduce((sum, i) => sum + i.qty, 0);
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('grand-total');
            const hiddenSummary = document.getElementById('hidden-order-summary');
            
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding: 20px;">Your cart is empty.</p>';
                totalEl.innerText = '₹0';
                return;
            }

            let html = '';
            let total = 0;
            let summaryText = 'ORDER SUMMARY:\n------------------\n';

            cart.forEach(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                summaryText += `${item.name} x ${item.qty} = ₹${subtotal}\n`;
                
                html += `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight:600; font-size:0.9rem;">${item.name}</div>
                            <div style="font-size:0.8rem; color:var(--primary)">₹${item.price}</div>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                            <span>${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                        <div style="text-align:right; font-weight:bold;">₹${subtotal}</div>
                    </div>
                `;
            });

            summaryText += `------------------\nGRAND TOTAL: ₹${total}`;
            container.innerHTML = html;
            totalEl.innerText = '₹' + total;
            hiddenSummary.value = summaryText;
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;
            if (item.qty < 1) {
                cart = cart.filter(i => i.id !== id);
            }
            updateCart();
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        // Handle Order Submission
        document.getElementById('order-form').onsubmit = function() {
            if(cart.length === 0) {
                alert("Please add items to cart first!");
                return false;
            }
            
            // Allow form to submit to Formspree, then clear cart on a slight delay
            setTimeout(() => {
                alert("Order placed! Al-Dua Dates will contact you on WhatsApp to confirm.");
                cart = [];
                updateCart();
                window.location.href = "https://wa.me/917480056715?text=I%20just%20placed%20an%20order%20on%20your%20website.";
            }, 1000);
        };

        // Initialize
        renderProducts();
        updateCart();
    </script>
</body>
</html>
